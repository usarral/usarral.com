name: Scheduled publish

on:
  schedule:
    # 8:55 Madrid (CEST = UTC+2) on June 5th, 2026
    - cron: "55 6 5 6 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Trigger deploy and self-destruct
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove this workflow and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/scheduled-publish.yml
          git commit -m "chore: remove scheduled publish workflow"
          git push
